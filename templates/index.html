<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Дашборд ОПиОП</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", sans-serif;
        background:
          radial-gradient(980px 480px at 100% -5%, #d8efe8 0%, transparent 70%),
          radial-gradient(840px 420px at -10% 105%, #dce9f8 0%, transparent 72%),
          linear-gradient(180deg, #f8fbfe 0%, #edf3f8 100%);
        display: grid;
        place-items: center;
        color: #14283d;
        padding: 16px;
      }
      .card {
        width: min(960px, 100%);
        background: #fff;
        border: 1px solid #d5e3ef;
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(16, 33, 51, 0.06);
      }
      h1 {
        margin: 0;
        font-family: "Palatino Linotype", serif;
      }
      p {
        margin: 10px 0 0;
        color: #547089;
      }
      .links {
        margin-top: 16px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
      a {
        text-decoration: none;
        border: 1px solid #c8d9eb;
        border-radius: 12px;
        background: #eef6ff;
        color: #165487;
        padding: 12px;
        font-weight: 700;
      }
      a:hover { background: #e2effd; }
      @media (max-width: 860px) {
        .links { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Проект BI-дашборда</h1>
      <p>Основной сценарий теперь построен как вертикальный drill-down: Главная → Класс → Услуга → Вид затрат.</p>
      <div class="links">
        <a href="/dashboard">Открыть новый дашборд (вертикальная навигация)</a>
        <a href="/dashboard/legacy">Открыть старый экран (legacy)</a>
        <a href="/calculation-services-debug">Техническая страница по расчетам</a>
        <a href="/excel-debug">Все листы Excel (debug)</a>
      </div>
    </main>
  </body>
</html>

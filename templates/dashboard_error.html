{% extends "dashboard_shell.html" %}

{% block title %}Ошибка дашборда{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12 bg-white rounded-xl border border-red-200 shadow-sm p-8 text-center">
  <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
  </div>
  <h2 class="text-2xl font-bold text-gray-900 mb-2">Не удалось открыть страницу</h2>
  <p class="text-gray-500 mb-6">Возникла непредвиденная проблема при загрузке запрошенных данных.</p>
  
  <div class="bg-red-50 border border-red-100 text-red-800 rounded-lg p-4 text-left">
    <div class="flex items-start">
      <svg class="w-5 h-5 text-red-500 mt-0.5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <div>
        <h4 class="text-sm font-semibold text-red-800">Детали ошибки:</h4>
        <p class="mt-1 text-sm">{{ error }}</p>
      </div>
    </div>
  </div>

  <div class="mt-8">
    <a href="{{ url_for('dashboard_home') }}" class="inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-brand-600 hover:bg-brand-700 shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      Вернуться на главную
    </a>
  </div>
</div>
{% endblock %}
